---
layout: default
---

<div class="home">

  <ul class="post-list">
    {% for post in site.posts %}
      <li>
        <span class="post-meta">{{ post.date | date: "%b %-d, %Y" }}</span>
        <h2 class="post-title">{{ post.title }}</h2>
        {{ post.content | truncatewords:25 }}
        <br>
        <a href="{{ post.url | prepend: site.baseurl }}">Leia mais >></a>
      </li>
    {% endfor %}
  </ul>

</div>
