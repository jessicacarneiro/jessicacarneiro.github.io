---
layout: page
title: Archive
permalink: /archive/
---

 <h2>All posts</h2>
  <ul class="post-list">
    {% for post in site.posts %}
      <li>
        <span class="post-meta">{{ post.date | date: "%b %-d, %Y" }}</span> -
        <a href="{{ post.url | prepend: site.baseurl }}"><strong>{{ post.title }}</strong></a>
      </li>
    {% endfor %}
  </ul>
